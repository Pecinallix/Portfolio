<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a0f2e"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Purple glow -->
  <ellipse cx="400" cy="200" rx="300" ry="150" fill="#7c3aed" opacity="0.08"/>

  <!-- Terminal window -->
  <rect x="80" y="60" width="640" height="280" rx="10" fill="url(#termGrad)" stroke="#7c3aed" stroke-width="1" opacity="0.95"/>

  <!-- Title bar -->
  <rect x="80" y="60" width="640" height="36" rx="10" fill="#1e1e2e"/>
  <rect x="80" y="82" width="640" height="14" fill="#1e1e2e"/>

  <!-- Traffic lights -->
  <circle cx="108" cy="78" r="6" fill="#ff5f57"/>
  <circle cx="128" cy="78" r="6" fill="#ffbd2e"/>
  <circle cx="148" cy="78" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="83" font-family="monospace" font-size="13" fill="#7c3aed" text-anchor="middle" opacity="0.9">string-guardian</text>

  <!-- Code content -->
  <!-- Line 1: prompt -->
  <text x="108" y="130" font-family="monospace" font-size="12" fill="#6d28d9">$</text>
  <text x="120" y="130" font-family="monospace" font-size="12" fill="#a78bfa"> encoding.py detect arquivo.php</text>

  <!-- Line 2: detected -->
  <text x="108" y="152" font-family="monospace" font-size="12" fill="#34d399">✓</text>
  <text x="120" y="152" font-family="monospace" font-size="12" fill="#6ee7b7"> Detected: cp1252 (Windows-1252)</text>

  <!-- Line 3: converting -->
  <text x="108" y="174" font-family="monospace" font-size="12" fill="#60a5fa">→</text>
  <text x="120" y="174" font-family="monospace" font-size="12" fill="#93c5fd"> Converting to UTF-8 for Claude...</text>

  <!-- Divider -->
  <line x1="108" y1="188" x2="692" y2="188" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

  <!-- Code block -->
  <text x="108" y="210" font-family="monospace" font-size="11" fill="#7c3aed">// Before</text>
  <text x="108" y="228" font-family="monospace" font-size="11" fill="#f8fafc">$nome = <tspan fill="#34d399">"André"</tspan>;</text>
  <text x="108" y="246" font-family="monospace" font-size="11" fill="#f8fafc">echo <tspan fill="#34d399">"Olá, "</tspan> . $nome;</text>

  <!-- Arrow -->
  <text x="420" y="228" font-family="monospace" font-size="18" fill="#7c3aed" text-anchor="middle">→</text>

  <!-- Code block after -->
  <text x="480" y="210" font-family="monospace" font-size="11" fill="#7c3aed">// After (preserved)</text>
  <text x="480" y="228" font-family="monospace" font-size="11" fill="#f8fafc">$nome = <tspan fill="#34d399">"André"</tspan>;</text>
  <text x="480" y="246" font-family="monospace" font-size="11" fill="#f8fafc">echo <tspan fill="#34d399">"Olá, "</tspan> . $nome;</text>

  <!-- Status bar -->
  <rect x="80" y="308" width="640" height="32" rx="0" fill="#12112a"/>
  <rect x="80" y="328" width="640" height="12" rx="0" fill="#12112a"/>

  <text x="108" y="328" font-family="monospace" font-size="11" fill="#34d399">✓ ACCENTED CHARS PRESERVED</text>
  <text x="420" y="328" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">✓ ZERO CORRUPTION</text>
  <text x="692" y="328" font-family="monospace" font-size="11" fill="#34d399" text-anchor="end">✓ NO CONFIG</text>
</svg>
