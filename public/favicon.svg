<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#004e89"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)" stroke="url(#accentGradient)" stroke-width="1.5"/>
  <!-- Code symbol with gradient -->
  <text x="32" y="44" text-anchor="middle" font-family="'Space Mono', monospace" font-weight="bold" font-size="28" fill="url(#accentGradient)" letter-spacing="-1">&lt;/&gt;</text>
  <!-- Subtle accent corner -->
  <circle cx="54" cy="10" r="3" fill="#ff6b35" opacity="0.8"/>
</svg>
