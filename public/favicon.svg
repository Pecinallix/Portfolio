<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gilt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a07c3f"/>
      <stop offset="45%" stop-color="#e7d2a0"/>
      <stop offset="70%" stop-color="#c9a86a"/>
      <stop offset="100%" stop-color="#a07c3f"/>
    </linearGradient>
  </defs>

  <!-- Warm charcoal plate -->
  <rect x="2" y="2" width="60" height="60" rx="6" fill="#14130f"/>
  <!-- Champagne hairline frame -->
  <rect x="5.5" y="5.5" width="53" height="53" rx="3.5" fill="none" stroke="#c9a86a" stroke-width="1" opacity="0.45"/>

  <!-- Serif monogram -->
  <text x="32" y="44" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="38" fill="url(#gilt)">íp</text>
</svg>
